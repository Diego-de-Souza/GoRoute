<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <!-- CSP: só esta meta — manter alinhado com GOROUTE_CSP_DOCUMENT em csp-policy.constants.ts -->
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com 'unsafe-inline' blob: data:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https://api.open-meteo.com http: https: ws: wss: data: blob:; frame-src 'none'; worker-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests"
  />
  <title>GoRoute — roadmap de carreira orientado a dados</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta
    http-equiv="Permissions-Policy"
    content="geolocation=(self), camera=(), microphone=(), payment=(), usb=(), interest-cohort=()"
  >
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  >
</head>
<body>
  <app-root></app-root>
</body>
</html>
